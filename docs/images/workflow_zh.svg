<?xml version='1.0' encoding='utf-8'?>
<ns0:svg xmlns:ns0="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <ns0:title id="title">CraftEngine asset pack generation workflow</ns0:title>
  <ns0:desc id="desc">A flow diagram from image import to language files, configuration files, resource pack files, and final zip download.</ns0:desc>
  <ns0:defs>
    <ns0:linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <ns0:stop offset="0" stop-color="#ffffff" />
      <ns0:stop offset="1" stop-color="#f3f8f4" />
    </ns0:linearGradient>
    <ns0:marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <ns0:path d="M2 2l8 4-8 4z" fill="#28765f" />
    </ns0:marker>
  </ns0:defs>
  <ns0:rect width="1200" height="520" fill="#f2f5f1" />
  <ns0:text x="70" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#17211b">浏览器端生成工作流</ns0:text>
  <ns0:text x="70" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#64736a">图片保留在本地。浏览器会准备 CraftEngine 所需的所有文件，并导出一个 zip 压缩包。</ns0:text>
  <ns0:g font-family="Segoe UI, Arial, sans-serif">
    <ns0:g>
      <ns0:rect x="70" y="160" width="190" height="170" rx="16" fill="url(#panel)" stroke="#d7e2da" />
      <ns0:circle cx="112" cy="205" r="24" fill="#1f745b" />
      <ns0:path d="M100 205h24M112 193v24" stroke="#fff" stroke-width="5" stroke-linecap="round" />
      <ns0:text x="96" y="255" font-size="18" font-weight="800" fill="#17211b">1. 导入</ns0:text>
      <ns0:text x="96" y="282" font-size="13" fill="#64736a">拖放 PNG、JPG 或 WEBP</ns0:text>
      <ns0:text x="96" y="304" font-size="13" fill="#64736a">按资源类型分类。</ns0:text>
    </ns0:g>
    <ns0:path d="M272 245h72" stroke="#28765f" stroke-width="3" marker-end="url(#arrow)" />
    <ns0:g>
      <ns0:rect x="356" y="160" width="190" height="170" rx="16" fill="url(#panel)" stroke="#d7e2da" />
      <ns0:circle cx="398" cy="205" r="24" fill="#d28b2d" />
      <ns0:path d="M388 202h20M388 211h28M388 193h32" stroke="#fff" stroke-width="4" stroke-linecap="round" />
      <ns0:text x="382" y="255" font-size="18" font-weight="800" fill="#17211b">2. 规范化</ns0:text>
      <ns0:text x="382" y="282" font-size="13" fill="#64736a">ID、名称、PNG 输出、</ns0:text>
      <ns0:text x="382" y="304" font-size="13" fill="#64736a">以及可选的 DeepL 文本。</ns0:text>
    </ns0:g>
    <ns0:path d="M558 245h72" stroke="#28765f" stroke-width="3" marker-end="url(#arrow)" />
    <ns0:g>
      <ns0:rect x="642" y="160" width="218" height="170" rx="16" fill="url(#panel)" stroke="#d7e2da" />
      <ns0:circle cx="684" cy="205" r="24" fill="#506f8d" />
      <ns0:path d="M674 195h20l10 10v18h-30z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round" />
      <ns0:text x="668" y="255" font-size="18" font-weight="800" fill="#17211b">3. 生成文件</ns0:text>
      <ns0:text x="668" y="282" font-size="13" fill="#64736a">pack.yml、categories.yml、</ns0:text>
      <ns0:text x="668" y="304" font-size="13" fill="#64736a">语言文件、配置、纹理。</ns0:text>
    </ns0:g>
    <ns0:path d="M872 245h72" stroke="#28765f" stroke-width="3" marker-end="url(#arrow)" />
    <ns0:g>
      <ns0:rect x="956" y="160" width="174" height="170" rx="16" fill="url(#panel)" stroke="#d7e2da" />
      <ns0:circle cx="998" cy="205" r="24" fill="#1f745b" />
      <ns0:path d="M988 201l10 10 18-22" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
      <ns0:text x="982" y="255" font-size="18" font-weight="800" fill="#17211b">4. 导出</ns0:text>
      <ns0:text x="982" y="282" font-size="13" fill="#64736a">下载一个 CraftEngine</ns0:text>
      <ns0:text x="982" y="304" font-size="13" fill="#64736a">可用的 zip 压缩包。</ns0:text>
    </ns0:g>
  </ns0:g>
  <ns0:g font-family="Segoe UI, Arial, sans-serif">
    <ns0:rect x="175" y="390" width="850" height="54" rx="12" fill="#ffffff" stroke="#d7e2da" />
    <ns0:text x="205" y="424" font-size="14" font-weight="700" fill="#17211b">输出：</ns0:text>
    <ns0:text x="270" y="424" font-size="14" fill="#64736a">configuration/*.yml</ns0:text>
    <ns0:text x="450" y="424" font-size="14" fill="#64736a">resourcepack/assets/minecraft/textures</ns0:text>
    <ns0:text x="748" y="424" font-size="14" fill="#64736a">zh_cn / zh_tw / en_us</ns0:text>
  </ns0:g>
</ns0:svg>