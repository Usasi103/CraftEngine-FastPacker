<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">CraftEngine asset pack generation workflow</title>
  <desc id="desc">A flow diagram from image import to language files, configuration files, resource pack files, and final zip download.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3f8f4"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#28765f"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#f2f5f1"/>
  <text x="70" y="70" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#17211b">Browser-only generation workflow</text>
  <text x="70" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#64736a">Images stay local. The browser prepares every file required by CraftEngine and exports one zip archive.</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <g>
      <rect x="70" y="160" width="190" height="170" rx="16" fill="url(#panel)" stroke="#d7e2da"/>
      <circle cx="112" cy="205" r="24" fill="#1f745b"/>
      <path d="M100 205h24M112 193v24" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
      <text x="96" y="255" font-size="18" font-weight="800" fill="#17211b">1. Import</text>
      <text x="96" y="282" font-size="13" fill="#64736a">Drop PNG, JPG, or WEBP</text>
      <text x="96" y="304" font-size="13" fill="#64736a">by asset type.</text>
    </g>
    <path d="M272 245h72" stroke="#28765f" stroke-width="3" marker-end="url(#arrow)"/>
    <g>
      <rect x="356" y="160" width="190" height="170" rx="16" fill="url(#panel)" stroke="#d7e2da"/>
      <circle cx="398" cy="205" r="24" fill="#d28b2d"/>
      <path d="M388 202h20M388 211h28M388 193h32" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
      <text x="382" y="255" font-size="18" font-weight="800" fill="#17211b">2. Normalize</text>
      <text x="382" y="282" font-size="13" fill="#64736a">IDs, names, PNG output,</text>
      <text x="382" y="304" font-size="13" fill="#64736a">and optional DeepL text.</text>
    </g>
    <path d="M558 245h72" stroke="#28765f" stroke-width="3" marker-end="url(#arrow)"/>
    <g>
      <rect x="642" y="160" width="218" height="170" rx="16" fill="url(#panel)" stroke="#d7e2da"/>
      <circle cx="684" cy="205" r="24" fill="#506f8d"/>
      <path d="M674 195h20l10 10v18h-30z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
      <text x="668" y="255" font-size="18" font-weight="800" fill="#17211b">3. Generate files</text>
      <text x="668" y="282" font-size="13" fill="#64736a">pack.yml, categories.yml,</text>
      <text x="668" y="304" font-size="13" fill="#64736a">langs, configs, textures.</text>
    </g>
    <path d="M872 245h72" stroke="#28765f" stroke-width="3" marker-end="url(#arrow)"/>
    <g>
      <rect x="956" y="160" width="174" height="170" rx="16" fill="url(#panel)" stroke="#d7e2da"/>
      <circle cx="998" cy="205" r="24" fill="#1f745b"/>
      <path d="M988 201l10 10 18-22" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="982" y="255" font-size="18" font-weight="800" fill="#17211b">4. Export</text>
      <text x="982" y="282" font-size="13" fill="#64736a">Download a CraftEngine</text>
      <text x="982" y="304" font-size="13" fill="#64736a">ready zip archive.</text>
    </g>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="175" y="390" width="850" height="54" rx="12" fill="#ffffff" stroke="#d7e2da"/>
    <text x="205" y="424" font-size="14" font-weight="700" fill="#17211b">Output:</text>
    <text x="270" y="424" font-size="14" fill="#64736a">configuration/*.yml</text>
    <text x="450" y="424" font-size="14" fill="#64736a">resourcepack/assets/minecraft/textures</text>
    <text x="748" y="424" font-size="14" fill="#64736a">zh_cn / zh_tw / en_us</text>
  </g>
</svg>
